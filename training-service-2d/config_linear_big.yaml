# LINEAR-OPERATOR config: straight constant-velocity source, pi-groups PINNED.
# Collapses the operator input to 2 numbers (x0, v) -> low-dim, so FEW cases give DENSE coverage
# AND high visits/case. Use with: precompute_labels.py --config config_linear.yaml --n 256
# then train.py --config config_linear.yaml --cache labels_linear.npz --steps 40000 --n-traj 8
# (256 cases x 40k x 8 / 256 = 1250 visits/case — same as the random run that hit 76%, but 2D.)

physics:
  # pi-groups PINNED (min==max -> sampler returns the constant) -> only (x0,v) vary
  Fo_min: 3.0e-3
  Fo_max: 3.0e-3
  AR_min: 0.15
  AR_max: 0.15
  w_min: 0.08
  w_max: 0.08
  P_ref: 1.0
  t_end_ref: 1.0
  sigma_factor: 6.0

trajectory:
  linear: true            # straight constant-velocity source (x0 + v*t)
  k_sensors: 101
  n_fourier_modes: 5      # ignored in linear mode
  spectrum_decay: 2.0
  sigma0: 1.0
  x_margin: 0.05
  speed_max_star: 4.0

branch:
  hidden: [1024, 1024, 1024, 1024]   # 2x wider — push forward operator toward <20%
  out_dim: 256                    # p doubled (more basis fns); MUST equal trunk.out_dim

trunk:
  rff_num_features: 64
  rff_sigma_bands: [2.0, 6.0, 12.0]
  rff_sigma_start: 0.3    # curriculum ON: ramp the comb 0.3->1.0 (smooth start, fast early descent)
  rff_sigma_end: 1.0
  rff_sigma_ramp_frac: 0.5
  n_pirate_blocks: 3
  width: 512
  out_dim: 256

loss:
  lambda_data: 10.0
  lambda_pde: 1.0
  lambda_bc: 10.0
  lambda_flux: 0.0        # flux off (inconsistent with cosine labels at yhat=0); source via data
  lambda_ic: 0.0
  residual_clip_gamma: 0.0

batch:
  n_traj_per_batch: 64    # 2x batch: feeds the bigger model + fills 3090
  n_interior: 1024
  n_bc0: 256
  n_bc_ins: 256
  n_data: 512
  source_frac: 0.5
  source_band_sigmas: 3.0

training:
  optimizer: adam
  lr: 1.0e-3
  lr_min: 1.0e-5
  warmup_steps: 2000
  total_steps: 40000
  grad_clip_norm: 1.0
  use_amp: false
  use_compile: false
  use_fp64: false
  use_prefetch: true
  seed: 0
  checkpoint_every: 5000
  validate_every: 5000

analytic:
  fourier_M: 64
  fourier_N: 48
  quad_nx: 400
  quad_nt: 2000

cache:
  n_cases: 1024         # 2x denser (x0,v) coverage for the bigger model
  n_data_per_case: 512
  label_M: 48
  label_N: 32
  label_ntau: 400
  path: labels_linear.npz

fdm:
  nx: 201
  ny: 101
  nt: 400
  r_target: 0.4

validation:
  pi_table_n_cases: 64
  ensemble_size: 5
  thresholds:
    l2_green: 0.02
    l2_yellow: 0.05
    energy_green: 0.02
    energy_yellow: 0.05
    defect_green: 0.03
    defect_yellow: 0.08
