# ── Physics parameter ranges ────────────────────────────────────────────────
# The PINN is parameterized: it learns T for ALL combinations below.
physics:
  # Thermal diffusivity α = k/(ρc)  [m²/s]
  #   titanium ≈ 2.9e-6 | steel ≈ 1.2e-5 | aluminum ≈ 9.7e-5 | copper ≈ 1.17e-4
  alpha_range:     [2.9e-6, 1.2e-4]

  # Volumetric heat capacity ρ·c  [J/(m³·K)]
  #   titanium ≈ 2.34e6 | steel ≈ 3.9e6 | aluminum ≈ 2.43e6 | copper ≈ 3.45e6
  rho_c_range:     [2000000.0, 4000000.0]

  # Pipe length  [m]
  length_range:    [0.5, 3.0]

  # Burner intensity  [W/m]
  intensity_range: [500.0, 10000.0]

  # Burner start position as fraction of pipe length ∈ [0, 1)
  x0_fraction_range: [0.0, 0.3]

  # Burner velocity  [m/s]
  # Sampling is constrained so x0 + v·t_total ≤ l (stays inside pipe)
  velocity_range:  [0.005, 0.3]

  # Total simulation time  [s]
  t_total_range:   [10.0, 60.0]

  # Ambient temperature  [K]
  T_amb: 293.15

# ── Network architecture ────────────────────────────────────────────────────
model:
  # Random Fourier features applied to (x_norm, t_norm).
  # Sigma is annealed from sigma_start → sigma_end during Phase 1 Adam.
  # Low sigma first → network learns smooth global structure before sharp source.
  fourier_m:           64      # frequency samples → output dim = 2*m = 128
  fourier_sigma_start: 1.0     # initial bandwidth (smooth / low-frequency)
  fourier_sigma_end:   3.5     # final bandwidth (captures narrow heat source)

  hidden_layers: 4        # Dense layers after Fourier encoding
  hidden_size:   256      # neurons per layer
  # activation is hardcoded as tanh (best for PINNs)

# ── Collocation point sampling ──────────────────────────────────────────────
sampling:
  n_pde:              8192   # interior PDE residual points per step
  n_bc:               512    # boundary condition points per step (split x=0 / x=l)
  n_ic:               512    # initial condition points (kept for diagnostics only)
  n_params_per_step:  16     # number of physics-parameter sets sampled per step

  # RAD — Residual-based Adaptive Distribution (arXiv:2207.10289)
  # Evaluates residuals at a large candidate pool, then samples proportional to |residual|.
  # Points concentrate near the moving heat source automatically.
  # Disabled by default — enable for the next training run.
  rad_enabled:      true
  rad_pool_factor:  5     # candidate pool = pool_factor × n_pde  (40 960 points)
  rad_update_every: 50    # re-sample RAD points every N steps (cached between updates)

# ── Training ────────────────────────────────────────────────────────────────
training:
  # Phase 1: Adam + cosine LR annealing
  adam_steps:   120000
  adam_lr:      5.0e-4
  adam_lr_min:  1.0e-5

  # Loss weights
  # IC is hard-enforced via output = t_norm * NN(x,t,params), so lambda_ic = 0.
  # BC carries the full soft-constraint load → raised to 50.
  lambda_pde:  1.0
  lambda_bc:   50.0
  lambda_ic:   0.0

  # Causal time-weighting (Wang et al. 2022 / JMLR 2024).
  # Points in later time bins are downweighted while early-time residuals remain high.
  #   w_k = exp(-ε · Σ_{j<k} L_j)   where L_j = mean residual² in bin j
  causal_epsilon: 1.0   # ε — higher = stricter causality enforcement
  causal_n_bins:  10    # number of uniform time windows in [0, 1]

  # Gradient clipping
  grad_clip_norm: 1.0

  # Logging & checkpointing
  log_every:      200
  save_every:     5000
  validate_every: 5000
  checkpoint_dir: ./checkpoints

# ── Runtime ─────────────────────────────────────────────────────────────────
device: auto   # auto | cuda | mps | cpu  (Vast.ai → cuda, local Mac → mps)
seed:   42

# FP64 — double precision training (arXiv:2505.10949, NeurIPS 2025)
# Reduces floating-point accumulation errors in gradient computation.
# Effect is smaller for Adam than for L-BFGS (~10-20% error reduction).
# Slows training ~1.5x and doubles VRAM usage.
use_fp64: false

# torch.compile — fuses CUDA kernels, reduces CPU launch overhead (~20-40% speedup).
# mode="reduce-overhead" uses CUDA Graphs internally for repeated kernel patterns.
use_compile: false

# AMP — Automatic Mixed Precision (forward in FP16, gradients in FP32).
# Gives 1.5-2.5x speedup on consumer GPUs with tensor cores (RTX series).
# Pure FP16 is unsafe for PINNs; AMP keeps gradient accumulation in FP32.
# Only works on CUDA; ignored on CPU/MPS.
use_amp: true
